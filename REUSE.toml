# SPDX-FileCopyrightText: 2026 EU-UNION-AI-PACT
# SPDX-License-Identifier: CC0-1.0
#
# REUSE configuration (https://reuse.software/spec-3.3/). Files that cannot
# carry an inline SPDX header (JSON) or where an inline header would be noisy
# (Markdown documentation) are annotated here. Source files (*.sol, *.py) and
# config files (*.toml, *.yml, Makefile, .gitignore) carry inline headers.
version = 1

[[annotations]]
path = ["**.json"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 EU-UNION-AI-PACT"
SPDX-License-Identifier = "LicenseRef-UECF-Headquarter-1.0 AND CC0-1.0"

[[annotations]]
path = ["**.md"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 EU-UNION-AI-PACT"
SPDX-License-Identifier = "LicenseRef-UECF-Headquarter-1.0 AND CC-BY-4.0"

# Tooling-generated files that cannot carry an inline header.
[[annotations]]
path = [".gitmodules", "foundry.lock"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 EU-UNION-AI-PACT"
SPDX-License-Identifier = "CC0-1.0"

# Project-owned illustrative image (binary, cannot carry an inline header).
[[annotations]]
path = ["Gemini_Generated_Image_(9).png"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 EU-UNION-AI-PACT"
SPDX-License-Identifier = "CC-BY-4.0"

# Provided IXP table: a rendering of the Packet Clearing House (PCH) directory.
[[annotations]]
path = ["data/raw/pch-ixp-directory.tsv"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Packet Clearing House (https://www.pch.net/)"
SPDX-License-Identifier = "LicenseRef-PCH-Terms"

# Genuine upstream sample artifacts, each under its own (source) license.
[[annotations]]
path = ["data/samples/purl-type-cargo.json"]
precedence = "override"
SPDX-FileCopyrightText = "the purl-spec authors (https://github.com/package-url/purl-spec)"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = ["data/samples/caida-catalog-ixp.json"]
precedence = "override"
SPDX-FileCopyrightText = "CAIDA, Center for Applied Internet Data Analysis (https://catalog.caida.org/)"
SPDX-License-Identifier = "LicenseRef-CAIDA-AUP"

[[annotations]]
path = ["data/samples/peeringdb-equinix-ibx.json"]
precedence = "override"
SPDX-FileCopyrightText = "PeeringDB (https://www.peeringdb.com/)"
SPDX-License-Identifier = "CC-BY-4.0"

[[annotations]]
path = ["data/samples/gleif-lei-sample.json"]
precedence = "override"
SPDX-FileCopyrightText = "GLEIF, Global Legal Entity Identifier Foundation (https://www.gleif.org/)"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = ["data/samples/osm-overpass-sample.json"]
precedence = "override"
SPDX-FileCopyrightText = "OpenStreetMap contributors (https://www.openstreetmap.org/)"
SPDX-License-Identifier = "ODbL-1.0"

[[annotations]]
path = ["data/samples/wikidata-lei-sample.json"]
precedence = "override"
SPDX-FileCopyrightText = "Wikidata contributors (https://www.wikidata.org/)"
SPDX-License-Identifier = "CC0-1.0"
